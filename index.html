<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Japan Trip 2026 — 17 Days Interactive Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f3ee; color: #2d2d2d; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  header {
    background: linear-gradient(135deg, #c0392b 0%, #8e1a0e 100%);
    color: white; padding: 18px 28px;
    padding-left: max(28px, env(safe-area-inset-left));
    padding-right: max(28px, env(safe-area-inset-right));
    padding-top: max(18px, env(safe-area-inset-top));
    display: flex; align-items: center; gap: 14px; flex-shrink: 0;
  }

  .drawer-toggle {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 44px;
    height: 44px;
    padding: 0;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    color: inherit;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .drawer-toggle:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .drawer-toggle-bar {
    display: block;
    width: 22px;
    height: 2px;
    background: #fff;
    border-radius: 1px;
    transition: transform 0.2s, opacity 0.2s;
  }
  body.drawer-open .drawer-toggle .drawer-toggle-bar:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }
  body.drawer-open .drawer-toggle .drawer-toggle-bar:nth-child(2) { opacity: 0; }
  body.drawer-open .drawer-toggle .drawer-toggle-bar:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }

  .drawer-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 299;
    background: rgba(0,0,0,0.45);
    -webkit-tap-highlight-color: transparent;
  }
  body.drawer-open .drawer-backdrop { display: block; }

  .sidebar-mobile-header {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid #e0dbd3;
    background: #fff;
    flex-shrink: 0;
  }
  .sidebar-mobile-header span {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .drawer-close {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 10px;
    background: #f0ebe4;
    color: #333;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .drawer-close:focus-visible { outline: 2px solid #c0392b; outline-offset: 2px; }
  .day-badge {
    background: rgba(255,255,255,0.22); border-radius: 50%;
    width: 50px; height: 50px; display: flex; align-items: center;
    justify-content: center; font-size: 20px; font-weight: 800; flex-shrink: 0;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header p  { font-size: 13px; opacity: 0.82; margin-top: 2px; }

  .day-nav {
    background: #fff; border-bottom: 1px solid #e0dbd3;
    padding: 0; display: flex; overflow-x: auto; flex-shrink: 0;
    gap: 2px;
    -webkit-overflow-scrolling: touch;
    scroll-padding-inline: env(safe-area-inset-left);
    padding-inline: max(0px, env(safe-area-inset-left)) max(0px, env(safe-area-inset-right));
  }
  .day-tab {
    padding: 12px 14px; font-size: 12px; font-weight: 600;
    background: transparent; border: none; cursor: pointer;
    color: #777; white-space: nowrap; transition: all 0.2s;
    border-bottom: 3px solid transparent;
    min-height: 44px; flex-shrink: 0;
  }
  .day-tab:hover { color: #1a1a1a; }
  .day-tab.active {
    color: #c0392b; border-bottom-color: #c0392b;
  }
  .day-tab-badge {
    display: block; font-size: 10px; color: #999;
  }

  .layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  /* Desktop: only the sidebar scrolls; map + header stay viewport-fixed */
  @media (min-width: 901px) {
    html {
      height: 100%;
      overflow: hidden;
    }
    body {
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }
  }
  .sidebar { width: 330px; background: #fff; overflow-y: auto; border-right: 1px solid #e0dbd3; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
  .sidebar-inner { padding: 16px 16px 28px; padding-bottom: max(28px, env(safe-area-inset-bottom)); }

  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.1px;
    text-transform: uppercase; color: #aaa; margin: 18px 0 8px;
  }
  .section-label:first-child { margin-top: 0; }

  .travel-block {
    background: #f0f4ff; border-radius: 10px; padding: 10px 12px;
    margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px;
  }
  .travel-icon { font-size: 20px; padding-top: 2px; }
  .travel-info { font-size: 12px; color: #555; line-height: 1.5; }
  .travel-info strong { display: block; font-size: 13px; color: #1a1a1a; margin-bottom: 2px; }

  .stop {
    display: flex; gap: 10px; padding: 12px 10px;
    border-radius: 10px; cursor: pointer; transition: background 0.15s;
    border: 2px solid transparent; margin-bottom: 2px;
    min-height: 48px;
  }
  .stop:hover { background: #fdf8f5; }
  .stop.active { background: #fff4f0; border-color: #c0392b; }
  .stop-num {
    width: 26px; height: 26px; border-radius: 50%;
    color: white; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px;
  }
  .stop-content { flex: 1; }
  .stop-time  { font-size: 11px; color: #999; font-weight: 600; }
  .stop-name  { font-size: 13px; font-weight: 700; color: #1a1a1a; margin: 1px 0 3px; }
  .stop-desc  { font-size: 11.5px; color: #666; line-height: 1.45; }
  .tag {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 20px; margin-top: 4px; margin-right: 3px;
  }
  .t-transport { background: #e8f0fe; color: #1a73e8; }
  .t-food      { background: #fce8e6; color: #c0392b; }
  .t-activity  { background: #e6f4ea; color: #137333; }
  .t-hotel     { background: #fff3e0; color: #e65c00; }
  .t-warn      { background: #fce8e6; color: #c0392b; border: 1px solid #f5a9a9; }
  .connector { width: 2px; height: 10px; background: #e8e3db; margin: 0 0 2px 22px; }

  .map-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  #map { flex: 1; touch-action: pan-x pan-y pinch-zoom; }
  .notes-bar {
    background: #fffbe6; border-top: 1px solid #f0e68c;
    padding: 8px 16px; font-size: 11.5px; color: #6b5900;
    display: flex; gap: 18px; flex-wrap: wrap; flex-shrink: 0;
  }
  .notes-bar span::before { content: "ⓘ "; }

  .map-pin {
    width: 32px; height: 32px; border-radius: 50%;
    color: white; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2.5px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .map-pin:hover { transform: scale(1.15); }

  .gm-style .gm-style-iw-c { padding: 0 !important; overflow: visible !important; border-radius: 12px !important; box-shadow: 0 6px 24px rgba(0,0,0,0.22) !important; max-height: 70vh !important; max-width: none !important; }
  .gm-style .gm-style-iw-ch { padding: 0 !important; margin: 0 !important; height: auto !important; }
  .gm-style .gm-style-iw-d { overflow-x: hidden !important; overflow-y: auto !important; padding: 0 !important; max-height: 65vh !important; max-width: none !important; }
  .gm-style .gm-style-iw-t::after { display: none !important; }
  /* Hide Maps’ default close button */
  .gm-style .gm-style-iw-c > button,
  .gm-style .gm-style-iw-ch > button,
  .gm-style .gm-style-iw-ch button,
  .gm-style .gm-style-iw-c > button.gm-ui-hover-effect,
  .gm-style .gm-style-iw-c button[aria-label="Close"],
  .gm-style .gm-style-iw + button {
    display: none !important;
  }

  .iw { font-family: 'Segoe UI', Arial, sans-serif; width: 360px; }

  .iw-carousel-wrap { position: relative; width: 360px; }

  .iw-carousel { position: relative; width: 360px; height: 200px; background: #1a1a1a; overflow: hidden; }
  .iw-carousel-track { display: flex; height: 100%; transition: transform 0.35s cubic-bezier(.4,0,.2,1); will-change: transform; }
  .iw-carousel-track img { min-width: 360px; width: 360px; height: 200px; object-fit: cover; flex-shrink: 0; display: block; }
  .iw-placeholder {
    min-width: 360px; width: 360px; height: 200px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; background: linear-gradient(135deg,#f5f5f5,#e0e0e0);
  }
  .iw-loading {
    min-width: 360px; width: 360px; height: 200px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(135deg,#f5f5f5,#e8e8e8);
    font-size: 12px; color: #999;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid #ddd;
    border-top-color: #c0392b; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .iw-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(0,0,0,0.5); color: white; border: none; cursor: pointer;
    font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; z-index: 5;
  }
  .iw-arrow:hover { background: rgba(0,0,0,0.8); }
  .iw-arrow-left  { left: 8px; }
  .iw-arrow-right { right: 8px; }
  .iw-arrow.hidden { display: none; }
  .iw-counter {
    position: absolute; bottom: 8px; right: 10px;
    background: rgba(0,0,0,0.55); color: white;
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  }
  .iw-dots { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
  .iw-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.45); transition: background 0.2s; cursor: pointer; }
  .iw-dot.active { background: white; }

  .iw-body { padding: 11px 13px 4px; }
  .iw-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
  .iw-num { width: 22px; height: 22px; border-radius: 50%; color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .iw-name { font-size: 15px; font-weight: 700; color: #1a1a1a; line-height: 1.2; flex: 1; }
  .iw-meta { padding-left: 30px; margin-bottom: 6px; }
  .iw-time { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 3px; }
  .iw-desc { font-size: 12px; color: #444; line-height: 1.5; border-top: 1px solid #f0f0f0; padding-top: 8px; margin-top: 2px; }
  .iw-tags { margin-top: 7px; margin-bottom: 4px; }
  .iw-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; margin-right: 3px; margin-top: 3px; }
  .iw-topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 6px 10px;
  }
  .iw-topbar-side {
    width: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .iw-topbar-spacer { width: 32px; height: 32px; flex-shrink: 0; }
  .iw-topbar-center {
    flex: 1; min-width: 0; display: flex; justify-content: center; align-items: center;
  }
  .iw-stop-nav {
    width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
    background: #f1f3f4; color: #444; font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .iw-stop-nav:hover { background: #e8eaed; }
  .iw-gmaps-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #1a73e8; color: white; text-decoration: none;
    font-size: 12px; font-weight: 600; padding: 6px 14px;
    border-radius: 20px; transition: background 0.2s;
  }
  .iw-gmaps-btn:hover { background: #1558b0; }
  .iw-gmaps-btn svg { width: 12px; height: 12px; fill: white; flex-shrink: 0; }

  @media (max-width: 900px) {
    html { overflow-x: hidden; }
    .drawer-toggle { display: flex; }
    .layout {
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: min(90vw, 420px);
      max-height: none;
      border-right: 1px solid #e0dbd3;
      border-top: none;
      z-index: 300;
      transform: translateX(-100%);
      transition: transform 0.28s ease;
      box-shadow: 8px 0 32px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }
    body.drawer-open .sidebar {
      transform: translateX(0);
      pointer-events: auto;
    }
    body.drawer-open { overflow: hidden; }
    .sidebar-mobile-header { display: flex; }
    .sidebar-inner {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }
    .map-wrap {
      min-height: min(52vh, 480px);
      flex: 1 1 auto;
    }
    #map { min-height: min(52vh, 480px); }
    header { padding: 14px 18px; gap: 10px; }
    header h1 { font-size: clamp(15px, 4vw, 20px); line-height: 1.25; }
    header p { font-size: 12px; }
    .day-badge { width: 44px; height: 44px; font-size: 18px; }
    .day-tab { padding: 14px 16px; font-size: 13px; }
    .stop-name { font-size: 14px; }
    .stop-desc { font-size: 12px; }
  }

  @media (max-width: 480px) {
    .iw { width: min(calc(100vw - 24px), 360px) !important; max-width: 100%; }
    .iw-carousel-wrap { width: 100%; max-width: min(calc(100vw - 24px), 360px); }
    .iw-carousel { width: 100%; }
    .iw-carousel-track img,
    .iw-placeholder,
    .iw-loading {
      min-width: unset !important;
      width: 100% !important;
      max-width: min(calc(100vw - 24px), 360px);
    }
    .iw-stop-nav { width: 40px; height: 40px; font-size: 20px; }
    .iw-gmaps-btn { padding: 10px 16px; font-size: 13px; min-height: 44px; }
    .iw-arrow { width: 40px; height: 40px; font-size: 20px; }
  }
</style>
</head>
<body>

<div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>

<header>
  <button type="button" class="drawer-toggle" id="drawerToggle" aria-label="Open itinerary" aria-expanded="false" aria-controls="sidebar">
    <span class="drawer-toggle-bar" aria-hidden="true"></span>
    <span class="drawer-toggle-bar" aria-hidden="true"></span>
    <span class="drawer-toggle-bar" aria-hidden="true"></span>
  </button>
  <div class="day-badge" id="headerBadge">1</div>
  <div>
    <h1 id="headerTitle">Day 1 · Travel (ATL → ORD) · May 24</h1>
    <p id="headerSubtitle">Travel Day - Depart at 3:30pm</p>
  </div>
</header>

<div class="day-nav" id="dayNav"></div>

<div class="layout">
  <div class="sidebar" id="sidebar" role="navigation" aria-label="Day itinerary">

      <span>Itinerary</span>

    <div class="sidebar-inner" id="sidebarContent"></div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="notes-bar" id="notesBar" style="display:none;"></div>
  </div>
</div>

<script>

const cache = {};
const carouselPos = {};
let map, infoWindow, markers = [], currentPolyline = null;
let currentOpenIdx = -1;
let iwNavigateGen = 0;
/** Ignore marker “toggle close” briefly after any open (avoids spurious gmp-click when the map animates). */
let lastInfoWindowOpenAt = 0;
/** Ignore map clicks right after opening the InfoWindow (same gesture can fire both marker and map click). */
let suppressInfoWindowMapCloseUntil = 0;
let currentDay = 9;

/** Carousel slide width in px — matches .iw width on narrow viewports. */
function getIwSlidePx() {
  if (typeof window === 'undefined') return 360;
  const w = window.innerWidth;
  if (w <= 480) return Math.min(Math.max(260, w - 24), 360);
  return 360;
}

const MOBILE_LAYOUT_MQ = '(max-width: 900px)';
function isMobileLayout() {
  return typeof window !== 'undefined' && window.matchMedia(MOBILE_LAYOUT_MQ).matches;
}

function setDrawerOpen(open) {
  document.body.classList.toggle('drawer-open', open);
  const t = document.getElementById('drawerToggle');
  if (t) {
    t.setAttribute('aria-expanded', open);
    t.setAttribute('aria-label', open ? 'Close itinerary' : 'Open itinerary');
  }
  const side = document.getElementById('sidebar');
  if (side) {
    if (isMobileLayout()) side.setAttribute('aria-hidden', open ? 'false' : 'true');
    else side.removeAttribute('aria-hidden');
  }
}

function closeDrawerIfMobile() {
  if (isMobileLayout()) setDrawerOpen(false);
}

/** On mobile, scroll the day strip so the active tab is centered (helps early days on the left). */
function scrollActiveDayTabIntoView() {
  if (!isMobileLayout()) return;
  const nav = document.getElementById('dayNav');
  if (!nav) return;
  const tabs = nav.querySelectorAll('.day-tab');
  const active = tabs[currentDay];
  if (!active) return;
  active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function initDrawer() {
  const toggle = document.getElementById('drawerToggle');
  const backdrop = document.getElementById('drawerBackdrop');
  const closeBtn = document.getElementById('drawerClose');
  if (!toggle || !backdrop || !closeBtn) return;
  toggle.addEventListener('click', () => {
    setDrawerOpen(!document.body.classList.contains('drawer-open'));
  });
  backdrop.addEventListener('click', () => setDrawerOpen(false));
  closeBtn.addEventListener('click', () => setDrawerOpen(false));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.body.classList.contains('drawer-open')) setDrawerOpen(false);
  });
  let resizeDrawerTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeDrawerTimer);
    resizeDrawerTimer = setTimeout(() => {
      if (!isMobileLayout()) {
        document.body.classList.remove('drawer-open');
        const side = document.getElementById('sidebar');
        if (side) side.removeAttribute('aria-hidden');
        const t = document.getElementById('drawerToggle');
        if (t) {
          t.setAttribute('aria-expanded', 'false');
          t.setAttribute('aria-label', 'Open itinerary');
        }
      } else {
        setDrawerOpen(document.body.classList.contains('drawer-open'));
      }
    }, 150);
  });
  if (isMobileLayout()) {
    document.getElementById('sidebar').setAttribute('aria-hidden', 'true');
  }
}

function renderDayNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = '';
  DAYS.forEach((day, idx) => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (idx === currentDay ? ' active' : '');
    tab.innerHTML = `Day ${day.dayNum}<span class="day-tab-badge">${day.date.split('(')[1].replace(')', '')}</span>`;
    tab.onclick = () => switchDay(idx);
    nav.appendChild(tab);
  });
}

function switchDay(dayIdx) {
  currentDay = dayIdx;
  const day = DAYS[dayIdx];
  document.getElementById('headerBadge').textContent = day.dayNum;
  document.getElementById('headerTitle').textContent = `Day ${day.dayNum} · ${day.title} · ${day.date}`;
  document.getElementById('headerSubtitle').textContent = day.subtitle;
  renderSidebar(day);
  if (map) {
    map.setCenter(day.mapCenter);
    map.setZoom(day.zoom);
    clearMapMarkers();
    Object.keys(cache).forEach(k => delete cache[k]);
    Object.keys(carouselPos).forEach(k => delete carouselPos[k]);
    createMarkers(day.stops);
  }
  renderNotes(day.notes);
  document.querySelectorAll('.day-tab').forEach((t, i) => {
    t.classList.toggle('active', i === dayIdx);
  });
  scrollActiveDayTabIntoView();
}

function renderSidebar(day) {
  const html = [];
  if (day.travelBlocks && day.travelBlocks.length > 0) {
    html.push('<div class="section-label">Travel</div>');
    day.travelBlocks.forEach(block => {
      html.push(`<div class="travel-block"><div class="travel-icon">${block.icon}</div><div class="travel-info"><strong>${block.title}</strong>${block.info}</div></div>`);
    });
  }
  if (day.stops && day.stops.length > 0) {
    html.push('<div class="section-label">' + (day.travelBlocks?.length ? 'Stops' : 'Stops & Activities') + '</div>');
    day.stops.forEach((stop, i) => {
      const tags = stop.tags.map(t => `<span class="tag ${t.cls}">${t.l}</span>`).join('');
      html.push(`<div class="stop" data-idx="${i}" onclick="selectStop(${currentDay}, ${i})"><div class="stop-num" style="background:${stop.color};">${stop.num}</div><div class="stop-content"><div class="stop-time">${stop.time}</div><div class="stop-name">${stop.name}</div><div class="stop-desc">${stop.desc}</div>${tags}</div></div>`);
      if (i < day.stops.length - 1) { html.push('<div class="connector"></div>'); }
    });
  }
  document.getElementById('sidebarContent').innerHTML = html.join('');
}

function renderNotes(notes) {
  const bar = document.getElementById('notesBar');
  bar.style.display = 'none';
  return;
}

function clearMapMarkers() { markers.forEach(m => m.map = null); markers = []; if (currentPolyline) { currentPolyline.setMap(null); currentPolyline = null; } }

function createMarkers(stops) {
  if (!map) return;
  stops.forEach((s, i) => {
    const pin = document.createElement('div');
    pin.className = 'map-pin';
    pin.style.background = s.color;
    pin.textContent = String(s.num);
    const marker = new google.maps.marker.AdvancedMarkerElement({
      position: { lat: s.lat, lng: s.lng },
      map,
      content: pin,
      title: s.name,
      zIndex: i + 1
    });
    marker.addListener('gmp-click', () => {
      if (infoWindow && infoWindow.getMap() && currentOpenIdx === i) {
        if (Date.now() - lastInfoWindowOpenAt < 900) return;
        closeInfoWindowAndClearUI();
        return;
      }
      suppressInfoWindowMapCloseUntil = Date.now() + 450;
      map.panTo({ lat: s.lat, lng: s.lng });
      runAfterPanThenBottomOffset(() => {
        openIW(currentDay, i, marker);
        highlightSidebar(i);
      });
    });
    markers.push(marker);
  });
  if (stops.length > 1) {
    currentPolyline = new google.maps.Polyline({
      path: stops.map(s => ({ lat: s.lat, lng: s.lng })),
      geodesic: true,
      strokeColor: '#c0392b',
      strokeOpacity: 0.5,
      strokeWeight: 3,
      icons: [{ icon: { path: google.maps.SymbolPath.FORWARD_OPEN_ARROW, scale: 3, strokeColor: '#c0392b' }, offset: '50%' }],
      map
    });
  }
  stops.forEach((_, i) => fetchPlaceData(currentDay, i));
  if (markers.length > 0) {
    const s0 = stops[0];
    map.panTo({ lat: s0.lat, lng: s0.lng });
    runAfterPanThenBottomOffset(() => openIW(currentDay, 0, markers[0]));
  }
}

async function fetchPlaceData(dayIdx, stopIdx) {
  const cacheKey = `${dayIdx}-${stopIdx}`;
  if (cache[cacheKey]) return;
  const day = DAYS[dayIdx];
  const s = day.stops[stopIdx];
  const { Place } = await google.maps.importLibrary("places");
  try {
    const { places } = await Place.searchByText({
      textQuery: s.query,
      fields: ['id', 'photos'],
      maxResultCount: 1
    });
    if (!places || places.length === 0) { cache[cacheKey] = { photos: [], placeId: null }; return; }
    const place = places[0];
    const photoUrls = (place.photos || []).slice(0, 6).map(p => p.getURI({ maxWidth: 560, maxHeight: 316 }));
    cache[cacheKey] = { photos: photoUrls, placeId: place.id };
    if (currentOpenIdx === stopIdx && currentDay === dayIdx) {
      lastInfoWindowOpenAt = Date.now();
      infoWindow.setContent(buildIW(dayIdx, stopIdx));
      hideGoogleInfoWindowDefaultClose();
    }
  } catch (e) {
    cache[cacheKey] = { photos: [], placeId: null };
  }
}

/** Hide Maps’ built-in InfoWindow close (outside our HTML). */
function hideGoogleInfoWindowDefaultClose() {
  const hide = () => {
    document.querySelectorAll('.gm-style-iw-c').forEach(c => {
      c.querySelectorAll(':scope > button').forEach(btn => {
        btn.style.setProperty('display', 'none', 'important');
      });
    });
    document.querySelectorAll('.gm-style-iw-ch button').forEach(btn => {
      if (!btn.closest('.iw')) btn.style.setProperty('display', 'none', 'important');
    });
    document.querySelectorAll('.gm-style-iw + button').forEach(btn => {
      btn.style.setProperty('display', 'none', 'important');
    });
  };
  hide();
  requestAnimationFrame(hide);
  setTimeout(hide, 0);
  setTimeout(hide, 80);
}

function closeInfoWindowAndClearUI() {
  if (!infoWindow || !infoWindow.getMap()) return;
  infoWindow.close();
  currentOpenIdx = -1;
  document.querySelectorAll('.stop').forEach(el => el.classList.remove('active'));
}

function openIW(dayIdx, stopIdx, marker) {
  currentOpenIdx = stopIdx;
  lastInfoWindowOpenAt = Date.now();
  suppressInfoWindowMapCloseUntil = Date.now() + 350;
  infoWindow.setContent(buildIW(dayIdx, stopIdx));
  infoWindow.open({ map, anchor: marker, shouldFocus: false });
  hideGoogleInfoWindowDefaultClose();
}

/** After map.panTo centers the marker, shift the view so the pin sits ~this many px above the map bottom (room for InfoWindow above). */
const MARKER_BOTTOM_OFFSET_PX = 90;

/** Call immediately after panTo / setZoom. On idle, applies vertical pixel offset, then runs callback after the next idle (panBy may animate). */
function runAfterPanThenBottomOffset(callback) {
  if (!map) return;
  google.maps.event.addListenerOnce(map, 'idle', () => {
    const h = map.getDiv().clientHeight;
    if (h >= 40) map.panBy(0, MARKER_BOTTOM_OFFSET_PX - h / 2);
    google.maps.event.addListenerOnce(map, 'idle', callback);
  });
}

function mapsUrl(dayIdx, stopIdx) {
  const cacheKey = `${dayIdx}-${stopIdx}`;
  const c = cache[cacheKey];
  const day = DAYS[dayIdx];
  const s = day.stops[stopIdx];
  const query = encodeURIComponent(s.name);
  if (c && c.placeId) return `https://www.google.com/maps/search/?api=1&query=${query}&query_place_id=${c.placeId}`;
  return `https://www.google.com/maps/search/?api=1&query=${query}`;
}

function buildIW(dayIdx, stopIdx) {
  const day = DAYS[dayIdx];
  const s = day.stops[stopIdx];
  const cacheKey = `${dayIdx}-${stopIdx}`;
  const c = cache[cacheKey];
  const photos = c ? c.photos : null;
  const cur = carouselPos[cacheKey] || 0;
  const n = photos ? photos.length : 0;
  let carouselHtml;
  if (!c) {
    carouselHtml = `<div class="iw-carousel"><div class="iw-carousel-track"><div class="iw-loading"><div class="spinner"></div>Loading photos…</div></div></div>`;
  } else if (n === 0) {
    carouselHtml = `<div class="iw-carousel"><div class="iw-carousel-track"><div class="iw-placeholder">${s.emoji}</div></div></div>`;
  } else {
    const imgs = photos.map(u => `<img src="${u}" alt="${s.name}">`).join('');
    const arrows = n > 1 ? `<button class="iw-arrow iw-arrow-left${cur === 0 ? ' hidden' : ''}" onclick="slide(${dayIdx},${stopIdx},-1)">&#8249;</button><button class="iw-arrow iw-arrow-right${cur === n-1 ? ' hidden' : ''}" onclick="slide(${dayIdx},${stopIdx},1)">&#8250;</button><div class="iw-counter">${cur+1} / ${n}</div><div class="iw-dots">${photos.map((_,i) => `<div class="iw-dot${i===cur?' active':''}" onclick="slideTo(${dayIdx},${stopIdx},${i})"></div>`).join('')}</div>` : '';
    const slideW = getIwSlidePx();
    carouselHtml = `<div class="iw-carousel"><div class="iw-carousel-track" id="track-${cacheKey}" style="transform:translateX(-${cur * slideW}px)">${imgs}</div>${arrows}</div>`;
  }
  const totalStops = day.stops.length;
  const esc = (str) => String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  const prevCell = stopIdx > 0
    ? `<button type="button" class="iw-stop-nav" title="${esc(day.stops[stopIdx - 1].name)}" onclick="navigateStop(-1)" aria-label="Previous stop">‹</button>`
    : '<span class="iw-topbar-spacer" aria-hidden="true"></span>';
  const nextCell = stopIdx < totalStops - 1
    ? `<button type="button" class="iw-stop-nav" title="${esc(day.stops[stopIdx + 1].name)}" onclick="navigateStop(1)" aria-label="Next stop">›</button>`
    : '<span class="iw-topbar-spacer" aria-hidden="true"></span>';
  const carouselBlock = `<div class="iw-carousel-wrap">${carouselHtml}</div>`;
  const tagsHtml = s.tags.map(t => `<span class="iw-tag ${t.cls}">${t.l}</span>`).join('');
  const topBarHtml = `<div class="iw-topbar"><div class="iw-topbar-side">${prevCell}</div><div class="iw-topbar-center"><a class="iw-gmaps-btn" href="${mapsUrl(dayIdx, stopIdx)}" target="_blank" rel="noopener noreferrer"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>Google Maps</a></div><div class="iw-topbar-side">${nextCell}</div></div>`;
  return `<div class="iw" style="position:relative;">${topBarHtml}${carouselBlock}<div class="iw-body"><div class="iw-top"><div class="iw-num" style="background:${s.color};">${s.num}</div><div class="iw-name">${s.name}</div></div><div class="iw-meta"><div class="iw-time">⏱ ${s.time}</div></div><div class="iw-desc">${s.desc}</div><div class="iw-tags">${tagsHtml}</div></div></div>`;
}

function slide(dayIdx, stopIdx, dir) {
  const cacheKey = `${dayIdx}-${stopIdx}`;
  const n = (cache[cacheKey] && cache[cacheKey].photos) ? cache[cacheKey].photos.length : 0;
  carouselPos[cacheKey] = Math.max(0, Math.min(n - 1, (carouselPos[cacheKey] || 0) + dir));
  updateCarousel(cacheKey);
}

function slideTo(dayIdx, stopIdx, i) {
  const cacheKey = `${dayIdx}-${stopIdx}`;
  carouselPos[cacheKey] = i;
  updateCarousel(cacheKey);
}

function updateCarousel(cacheKey) {
  const cur = carouselPos[cacheKey] || 0;
  const n = (cache[cacheKey] && cache[cacheKey].photos) ? cache[cacheKey].photos.length : 0;
  const track = document.getElementById('track-' + cacheKey);
  if (!track) return;
  track.style.transform = `translateX(-${cur * getIwSlidePx()}px)`;
  const wrap = track.closest('.iw-carousel');
  if (!wrap) return;
  const lBtn = wrap.querySelector('.iw-arrow-left');
  const rBtn = wrap.querySelector('.iw-arrow-right');
  const ctr = wrap.querySelector('.iw-counter');
  const dots = wrap.querySelectorAll('.iw-dot');
  if (lBtn) lBtn.classList.toggle('hidden', cur === 0);
  if (rBtn) rBtn.classList.toggle('hidden', cur === n - 1);
  if (ctr) ctr.textContent = `${cur+1} / ${n}`;
  dots.forEach((d, i) => d.classList.toggle('active', i === cur));
}

function highlightSidebar(idx) {
  document.querySelectorAll('.stop').forEach(s => s.classList.remove('active'));
  const stops = document.querySelectorAll('.stop');
  if (!stops[idx]) return;
  stops[idx].classList.add('active');
  const el = stops[idx];
  const scrollEl = isMobileLayout()
    ? document.querySelector('.sidebar-inner')
    : document.getElementById('sidebar');
  if (!scrollEl) return;
  const cRect = scrollEl.getBoundingClientRect();
  const eRect = el.getBoundingClientRect();
  const delta = (eRect.top + eRect.height / 2) - (cRect.top + cRect.height / 2);
  scrollEl.scrollTo({ top: scrollEl.scrollTop + delta, behavior: 'smooth' });
}

function selectStop(dayIdx, stopIdx) {
  const day = DAYS[dayIdx];
  const s = day.stops[stopIdx];
  map.panTo({ lat: s.lat, lng: s.lng });
  map.setZoom(17);
  runAfterPanThenBottomOffset(() => {
    openIW(dayIdx, stopIdx, markers[stopIdx]);
  });
  highlightSidebar(stopIdx);
  closeDrawerIfMobile();
}

function navigateStop(dir) {
  const day = DAYS[currentDay];
  const newIdx = currentOpenIdx + dir;
  if (newIdx < 0 || newIdx >= day.stops.length) return;
  const s = day.stops[newIdx];
  currentOpenIdx = newIdx;
  const gen = ++iwNavigateGen;
  map.panTo({ lat: s.lat, lng: s.lng });
  google.maps.event.addListenerOnce(map, 'idle', () => {
    if (gen !== iwNavigateGen || currentOpenIdx !== newIdx) return;
    const h = map.getDiv().clientHeight;
    if (h >= 40) map.panBy(0, MARKER_BOTTOM_OFFSET_PX - h / 2);
    google.maps.event.addListenerOnce(map, 'idle', () => {
      if (gen !== iwNavigateGen || currentOpenIdx !== newIdx) return;
      openIW(currentDay, newIdx, markers[newIdx]);
    });
  });
  highlightSidebar(newIdx);
}

async function initMap() {
  const { Map, InfoWindow } = await google.maps.importLibrary("maps");
  await google.maps.importLibrary("marker");
  await google.maps.importLibrary("places");
  map = new Map(document.getElementById('map'), {
    center: DAYS[currentDay].mapCenter,
    zoom: DAYS[currentDay].zoom,
    mapId: 'DEMO_MAP_ID',
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true
  });
  infoWindow = new InfoWindow({ maxWidth: Math.min(Math.max(280, window.innerWidth - 24), 360), disableAutoPan: true });
  google.maps.event.addListener(infoWindow, 'domready', () => {
    hideGoogleInfoWindowDefaultClose();
  });
  map.addListener('click', () => {
    if (Date.now() < suppressInfoWindowMapCloseUntil) return;
    closeInfoWindowAndClearUI();
  });
  let resizeIwTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeIwTimer);
    resizeIwTimer = setTimeout(() => {
      if (infoWindow && infoWindow.getMap() && currentOpenIdx >= 0) {
        updateCarousel(`${currentDay}-${currentOpenIdx}`);
      }
    }, 150);
  });
  renderDayNav();
  switchDay(currentDay);
}

window.initMap = initMap;
window.switchDay = switchDay;
window.selectStop = selectStop;
window.slide = slide;
window.slideTo = slideTo;
window.navigateStop = navigateStop;

initDrawer();
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASFZsibwPn4OzGJmyniMlYocDzPUbbGmY&loading=async&callback=initMap"></script>
</body>
